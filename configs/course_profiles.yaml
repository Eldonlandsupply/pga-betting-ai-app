# course_profiles.yaml
# Course intelligence database.
# Each course entry defines its demand profile, which drives
# course-specific SG weight shifts in fit_model.py.
#
# comp_courses: list of courses with similar demand profiles
# sg_weights: override global sg_default_weights for this course
# scoring_env: "scoring" (low scoring) or "survival" or "balanced"

version: "1.0.0"

courses:

  augusta_national:
    display_name: "Augusta National Golf Club"
    event: "Masters Tournament"
    tour: "PGA"
    yardage: 7510
    par: 72
    altitude_ft: 375
    agronomy: "bentgrass_greens_bermuda_fairways"
    green_type: "bent"
    rough_severity: "medium"
    fairway_width: "moderate"
    driving_penalty: "moderate"
    wedge_frequency: "low"
    approach_emphasis: "mid_iron_heavy"
    putting_emphasis: "high"
    scoring_env: "survival_then_scoring"
    weather_exposure: "low"
    wind_factor: "low"
    altitude_factor: "negligible"
    archetype_fit: ["iron_players", "elite_putters", "creative_scramblers"]
    archetype_penalize: ["bomber_spray_drivers", "bermuda_only_putters"]
    sg_weights:
      sg_ott: 0.18
      sg_app: 0.38
      sg_atg: 0.22
      sg_putt: 0.22
    comp_courses:
      - "muirfield_village"
      - "quail_hollow"
      - "bay_hill"
    notes: "Par 5 birdie conversion critical. Amen Corner demands creativity. Putting on slopes is tournament-defining."

